<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>棚卸しアプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:#f5f5f5;min-height:100vh;color:#222;-webkit-text-size-adjust:100%}
.screen{display:none;padding:1.5rem 1rem;max-width:480px;margin:0 auto}
.screen.active{display:block}
h1{font-size:20px;font-weight:500;margin-bottom:1.5rem}
h2{font-size:15px;font-weight:500;margin:1rem 0 0.75rem}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
input[type=text],input[type=number]{width:100%;padding:11px 12px;border:1px solid #ccc;border-radius:8px;font-size:16px;outline:none;background:#fff;color:#222;-webkit-appearance:none;appearance:none}
input[type=text]:focus,input[type=number]:focus{border-color:#555}
button{display:inline-block;padding:11px 18px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid #ccc;background:#fff;color:#222;-webkit-appearance:none;appearance:none;touch-action:manipulation}
.btn-primary{background:#222;color:#fff;border-color:#222}
.btn-danger{color:#c00;border-color:#f5c0c0}
.tab-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.tab{padding:9px 14px;border-radius:8px;border:1px solid #ccc;background:#fff;font-size:13px;cursor:pointer;color:#666}
.tab.active{background:#222;color:#fff;border-color:#222}
.add-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.add-row input:first-child{flex:2;min-width:100px}
.add-row input:nth-child(2){flex:1;min-width:70px}
.badge{display:inline-block;background:#f0f0f0;color:#666;border-radius:20px;padding:2px 10px;font-size:12px;margin-left:6px}
.product-item{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.product-item:last-child{border-bottom:none}
.unit-label{color:#999;font-size:12px;margin-left:6px}
.empty{text-align:center;color:#bbb;font-size:14px;padding:2rem 0}
.progress-bar{background:#e8e8e8;border-radius:4px;height:6px;margin-bottom:6px}
.progress-fill{background:#222;border-radius:4px;height:6px;transition:width 0.3s}
.progress-text{font-size:13px;color:#888;margin-bottom:1.25rem}
.big-card{background:#fff;border:1px solid #e0e0e0;border-radius:16px;padding:2rem 1.5rem;text-align:center;margin-bottom:1.5rem}
.product-name{font-size:22px;font-weight:500;margin-bottom:0.4rem;word-break:break-all}
.unit-hint{font-size:13px;color:#999;margin-bottom:1.25rem;min-height:18px}
.qty-input{font-size:30px;text-align:center;border:1px solid #ccc;border-radius:8px;padding:14px;width:100%;-webkit-appearance:none;appearance:none;color:#222;background:#fff}
.btn-row{display:flex;gap:8px;margin-bottom:10px}
.btn-row button{flex:1}
.btn-row button.main{flex:2}
.skip-btn{width:100%;color:#aaa;border-color:#eee;font-size:13px;padding:10px}
.stat-row{display:flex;gap:8px;margin-bottom:1rem}
.stat-card{flex:1;background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:1rem;text-align:center}
.stat-label{font-size:12px;color:#999;margin-bottom:4px}
.stat-val{font-size:22px;font-weight:500}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:14px}
.result-row:last-child{border-bottom:none}
.result-qty{font-weight:500}
.result-skip{color:#ccc}
.action-row{display:flex;gap:8px;margin-bottom:10px}
.action-row button{flex:1;font-size:13px;padding:11px 10px}
.back-btn{width:100%;color:#aaa;border-color:#eee;font-size:13px;padding:10px}
</style>
</head>
<body>

<!-- セットアップ -->
<div id="setupScreen" class="screen active">
  <h1>棚卸しアプリ</h1>

  <div class="tab-row">
    <button class="tab active" onclick="showTab('default')">商品リスト</button>
    <button class="tab" onclick="showTab('manual')">手入力で追加</button>
  </div>

  <div id="defaultTab" class="card">
    <p style="font-size:13px;color:#888">デフォルトの商品リスト（131件）が読み込まれています。<br>手入力タブから商品を追加することもできます。</p>
  </div>

  <div id="manualTab" class="card" style="display:none">
    <div class="add-row">
      <input type="text" id="nameInput" placeholder="商品名" onkeydown="if(event.key==='Enter')document.getElementById('unitInput').focus()">
      <input type="text" id="unitInput" placeholder="単位（例：本）" onkeydown="if(event.key==='Enter')addProduct()">
      <button class="btn-primary" onclick="addProduct()">追加</button>
    </div>
  </div>

  <h2>登録済み商品 <span id="countBadge" class="badge">0件</span></h2>
  <div id="productList" class="card"></div>

  <button class="btn-primary" id="startBtn" style="width:100%;padding:14px;font-size:15px" onclick="startInventory()">棚卸しを開始</button>
</div>

<!-- 棚卸し -->
<div id="inventoryScreen" class="screen">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText">0 / 0</div>
  <div class="big-card">
    <div class="unit-hint" id="productIndex">1 / 1</div>
    <div class="product-name" id="currentName"></div>
    <div class="unit-hint" id="unitHint"></div>
    <input type="number" class="qty-input" id="qtyInput" placeholder="0" min="0" inputmode="numeric" onkeydown="if(event.key==='Enter')goNext()">
  </div>
  <div class="btn-row">
    <button id="prevBtn" onclick="goPrev()">← 戻る</button>
    <button class="btn-primary main" id="nextBtn" onclick="goNext()">次へ →</button>
  </div>
  <button class="skip-btn" onclick="skipProduct()">スキップ（未入力のまま次へ）</button>
</div>

<!-- 結果 -->
<div id="resultScreen" class="screen">
  <h1>棚卸し完了</h1>
  <div class="stat-row">
    <div class="stat-card"><div class="stat-label">入力済み</div><div class="stat-val" id="doneCount">0</div></div>
    <div class="stat-card"><div class="stat-label">スキップ</div><div class="stat-val" id="skipCount">0</div></div>
  </div>
  <div class="card" id="resultList"></div>
  <div class="action-row">
    <button class="btn-primary" onclick="downloadCSV()">CSVダウンロード</button>
    <button onclick="restartInventory()">やり直す</button>
  </div>
  <button class="back-btn" onclick="goSetup()">商品登録に戻る</button>
</div>

<script>
var DEFAULT_PRODUCTS = [
  {name:"紅芋ペースト",unit:"個"},{name:"黒ごまペースト",unit:"個"},
  {name:"ブルーベリージャム",unit:"個"},{name:"イチゴジャム",unit:"個"},
  {name:"グラニュー糖",unit:"個"},{name:"バナナ",unit:"房"},
  {name:"薄力粉",unit:"個"},{name:"卵",unit:"パック"},
  {name:"生クリーム",unit:"個"},{name:"さつまいものグラノーラ",unit:"個"},
  {name:"紗々",unit:"個"},{name:"いちご",unit:"個"},
  {name:"いちごのグラノーラ",unit:"個"},{name:"チョコのグラノーラ",unit:"個"},
  {name:"バター",unit:"個"},{name:"さつまいも",unit:"袋"},
  {name:"チョコケーキ",unit:"個"},{name:"チョコソース",unit:"個"},
  {name:"芋グラノーラ",unit:"個"},{name:"芋ジェラート",unit:"ケース"},
  {name:"クリームチーズ",unit:"箱"},{name:"チョコクッキー",unit:"箱"},
  {name:"冷凍白玉",unit:"袋"},{name:"アーモンドクッキー",unit:"箱"},
  {name:"庄籠あんこ",unit:"個"},{name:"ミルクアイス",unit:"ケース"},
  {name:"粉糖",unit:"個"},{name:"ワッフル",unit:"個"},
  {name:"桃シロップ",unit:"本"},{name:"ジンジャーシロップ",unit:"本"},
  {name:"梅はちみつシロップ",unit:"本"},{name:"チェリーコーラシロップ",unit:"本"},
  {name:"クラフトコーラシロップ",unit:"本"},{name:"エスプレッソベース",unit:"本"},
  {name:"大葉",unit:"個"},{name:"ジンジャービア",unit:"本"},
  {name:"ライムシロップ",unit:"本"},{name:"カシスリキュール",unit:"本"},
  {name:"ルイボスティー茶葉",unit:"袋"},{name:"はちみつ",unit:"個"},
  {name:"白ワイン",unit:"本"},{name:"HOT赤ワイン",unit:"本"},
  {name:"HOT白ワイン",unit:"本"},{name:"赤ワイン",unit:"本"},
  {name:"ビターズシロップ",unit:"本"},{name:"氷",unit:"袋"},
  {name:"レモン",unit:"個"},{name:"ガムシロップ",unit:"本"},
  {name:"ミルク(珈琲用)",unit:"袋"},{name:"シロップ(珈琲用)",unit:"袋"},
  {name:"水",unit:"本"},{name:"ソーダ",unit:"本"},
  {name:"牛乳",unit:"本"},{name:"ブランデー",unit:"本"},
  {name:"メロンクリームソーダ",unit:"本"},{name:"桃ゼリー",unit:"個"},
  {name:"シナモン（粉）",unit:"個"},{name:"アップルジュース",unit:"本"},
  {name:"オレンジジュース",unit:"本"},{name:"トマトジュース",unit:"本"},
  {name:"ハイネケン",unit:"本"},{name:"ビール",unit:"本"},
  {name:"翠ジン",unit:"本"},{name:"ラム",unit:"本"},
  {name:"ウイスキー",unit:"本"},{name:"冷凍ミックスベリー",unit:"袋"},
  {name:"冷凍みかん",unit:"袋"},{name:"シナモン（棒）",unit:"袋"},
  {name:"川辺",unit:"本"},{name:"常楽梅酒",unit:"本"},
  {name:"常楽ウイスキー",unit:"本"},{name:"高田ジン",unit:"本"},
  {name:"極楽",unit:"本"},{name:"球磨川",unit:"本"},
  {name:"誉の露",unit:"本"},{name:"大石",unit:"本"},
  {name:"球磨の泉",unit:"本"},{name:"武者返し",unit:"本"},
  {name:"ロングペッパーリキュール",unit:"本"},{name:"あさぎりの花",unit:"本"},
  {name:"赤梅酒",unit:"本"},{name:"桃リキュール",unit:"本"},
  {name:"ゆずリキュール",unit:"本"},{name:"ヨーグルトリキュール",unit:"本"},
  {name:"紅茶リキュール",unit:"本"},{name:"珈琲リキュール",unit:"本"},
  {name:"コーヒー豆",unit:"袋"},{name:"玉緑茶茶葉",unit:"袋"},
  {name:"ほうじ茶茶葉",unit:"袋"},{name:"抹茶パウダー",unit:"袋"},
  {name:"マリブリキュール",unit:"本"},{name:"パイナップルジュース",unit:"本"},
  {name:"トニックウォーター",unit:"本"},{name:"ブルーキュラソーシロップ",unit:"本"},
  {name:"恋しそう",unit:"本"},{name:"ウォッカ",unit:"本"},
  {name:"さくらんぼ",unit:"袋"},{name:"生ハム",unit:"個"},
  {name:"ジャガイモ",unit:"袋"},{name:"乾燥パセリ",unit:"本"},
  {name:"粉チーズ",unit:"本"},{name:"ソーセージ",unit:"パック"},
  {name:"クレイジーソルト",unit:"本"},{name:"ホワイトチーズ",unit:"個"},
  {name:"サラミ",unit:"袋"},{name:"タルタルソース",unit:"袋"},
  {name:"マスタード",unit:"個"},{name:"ケチャップ",unit:"個"},
  {name:"ミックスナッツ",unit:"袋"},{name:"クラッカー",unit:"箱"},
  {name:"オリーブ",unit:"個"},{name:"ハーブソルト",unit:"本"},
  {name:"ポップコーン",unit:"個"},{name:"油",unit:"本"},
  {name:"山うに",unit:"個"},{name:"冷凍魚",unit:"袋"},
  {name:"六調子ウォッカ",unit:"本"},{name:"九代目",unit:"本"},
  {name:"宮の誉",unit:"本"},{name:"山河",unit:"本"},
  {name:"樽抜群",unit:"本"},{name:"文蔵梅酒",unit:"本"},
  {name:"繊月",unit:"本"},{name:"水鏡無私",unit:"本"},
  {name:"萬緑",unit:"本"},{name:"シトラスジン",unit:"本"},
  {name:"鳥飼",unit:"本"},{name:"kaoru",unit:"本"},
  {name:"桜パウダー",unit:"個"},{name:"桜の塩漬け",unit:"袋"},
  {name:"桜あん",unit:"袋"}
];

var products = DEFAULT_PRODUCTS.slice();
var answers = {};
var idx = 0;

function $(id){ return document.getElementById(id); }

renderList();

function showTab(t){
  $('defaultTab').style.display = t==='default'?'block':'none';
  $('manualTab').style.display = t==='manual'?'block':'none';
  var tabs = document.querySelectorAll('.tab');
  tabs[0].className = 'tab'+(t==='default'?' active':'');
  tabs[1].className = 'tab'+(t==='manual'?' active':'');
}

function addProduct(){
  var name = $('nameInput').value.trim();
  var unit = $('unitInput').value.trim();
  if(!name) return;
  if(!products.find(function(p){ return p.name===name; })){
    products.push({name:name, unit:unit});
    renderList();
  }
  $('nameInput').value='';
  $('unitInput').value='';
  $('nameInput').focus();
}

function removeProduct(i){
  products.splice(i,1);
  renderList();
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderList(){
  $('countBadge').textContent = products.length+'件';
  if(products.length===0){
    $('productList').innerHTML='<div class="empty">商品がまだありません</div>';
    return;
  }
  $('productList').innerHTML = products.map(function(p,i){
    return '<div class="product-item"><span>'+esc(p.name)+(p.unit?'<span class="unit-label">'+esc(p.unit)+'</span>':'')+'</span>'
      +'<button class="btn-danger" onclick="removeProduct('+i+')" style="padding:6px 12px;font-size:12px">削除</button></div>';
  }).join('');
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  $(id).classList.add('active');
  window.scrollTo(0,0);
}

function startInventory(){
  if(!products.length) return;
  answers={};idx=0;
  showScreen('inventoryScreen');
  renderCard();
}

function renderCard(){
  var p = products[idx];
  var total = products.length;
  $('progressFill').style.width = (idx/total*100)+'%';
  $('progressText').textContent = idx+' / '+total;
  $('productIndex').textContent = (idx+1)+' / '+total;
  $('currentName').textContent = p.name;
  $('unitHint').textContent = p.unit ? '単位：'+p.unit : '';
  $('prevBtn').disabled = idx===0;
  $('nextBtn').textContent = idx===total-1 ? '完了' : '次へ →';
  var q = $('qtyInput');
  q.value = answers[p.name]!==undefined ? answers[p.name] : '';
  setTimeout(function(){ q.focus(); }, 100);
}

function goNext(){
  var val = $('qtyInput').value;
  if(val===''){alert('数量を入力してください。\nスキップする場合は「スキップ」ボタンを使ってください。');return;}
  answers[products[idx].name] = parseInt(val,10);
  if(idx>=products.length-1){ showResult(); return; }
  idx++; renderCard();
}

function goPrev(){
  var val = $('qtyInput').value;
  if(val!=='') answers[products[idx].name]=parseInt(val,10);
  if(idx>0){ idx--; renderCard(); }
}

function skipProduct(){
  if(idx>=products.length-1){ showResult(); return; }
  idx++; renderCard();
}

function showResult(){
  var done=0, skip=0;
  var html = products.map(function(p){
    var q = answers[p.name];
    if(q!==undefined) done++; else skip++;
    return '<div class="result-row"><span>'+esc(p.name)+(p.unit?'<span class="unit-label">'+esc(p.unit)+'</span>':'')+'</span>'
      +'<span class="result-qty'+(q===undefined?' result-skip':'')+'">'+( q!==undefined?q:'-')+'</span></div>';
  }).join('');
  $('doneCount').textContent=done;
  $('skipCount').textContent=skip;
  $('resultList').innerHTML=html;
  showScreen('resultScreen');
}

function downloadCSV(){
  var bom='\uFEFF', header='商品名,単位,在庫数\n';
  var rows=products.map(function(p){
    return '"'+p.name+'","'+(p.unit||'"),'+(answers[p.name]!==undefined?answers[p.name]:'');
  }).join('\n');
  var csvContent=bom+header+rows;
  var d=new Date();
  var filename='棚卸し_'+d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2)+'.csv';
  try{
    var blob=new Blob([csvContent],{type:'text/csv;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url; a.download=filename;
    a.style.display='none';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ URL.revokeObjectURL(url); document.body.removeChild(a); },1000);
  }catch(e){
    window.open('data:text/csv;charset=utf-8,'+encodeURIComponent(csvContent),'_blank');
  }
}

function restartInventory(){
  answers={};idx=0;
  showScreen('inventoryScreen');
  renderCard();
}

function goSetup(){
  showScreen('setupScreen');
}
</script>
</body>
</html>
